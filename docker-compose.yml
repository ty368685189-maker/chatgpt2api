services:
  app:
    image: chatgpt2api-local:latest
    container_name: chatgpt2api-py
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    environment:
      - STORAGE_BACKEND=json
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "4521", "--access-log"]
